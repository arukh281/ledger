# Runs lint, build, and Supabase connectivity checks twice weekly.
# Sends email on success or failure (with full error log on failure).
# Schedule: Tuesday & Friday 09:00 UTC.
#
# Required repository secrets (Settings → Secrets and variables → Actions):
#   SUPABASE_URL       — same as NEXT_PUBLIC_SUPABASE_URL in .env.local
#   SUPABASE_ANON_KEY  — same as NEXT_PUBLIC_SUPABASE_ANON_KEY in .env.local
#   MAIL_SERVER        — SMTP host (e.g. smtp.gmail.com)
#   MAIL_PORT          — SMTP port (e.g. 587)
#   MAIL_USERNAME      — SMTP login / sender address
#   MAIL_PASSWORD      — SMTP password or app password
#   MAIL_TO            — where to send health-check emails
#
# Optional:
#   MAIL_FROM          — From header (defaults to MAIL_USERNAME)
#   APP_URL            — deployed app URL; pings /primary when set

name: App health check

on:
  schedule:
    - cron: '0 9 * * 2,5'
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
      APP_URL: ${{ secrets.APP_URL }}
      NOTIFY_TO: ${{ secrets.MAIL_TO }}
      NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
      NEXT_PUBLIC_FIREBASE_API_KEY: placeholder
      NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN: placeholder.firebaseapp.com
      NEXT_PUBLIC_FIREBASE_PROJECT_ID: placeholder
      NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET: placeholder.appspot.com
      NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID: "000000000000"
      NEXT_PUBLIC_FIREBASE_APP_ID: "1:000000000000:web:placeholder"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run health checks
        id: health
        continue-on-error: true
        run: |
          set -o pipefail
          bash scripts/ci-healthcheck.sh 2>&1 | tee "${RUNNER_TEMP}/healthcheck.log"
          exitCode="${PIPESTATUS[0]}"
          echo "exit_code=${exitCode}" >> "$GITHUB_OUTPUT"
          exit "${exitCode}"

      - name: Prepare email
        if: always()
        id: email
        env:
          HEALTH_OUTCOME: ${{ steps.health.outcome }}
        run: |
          log="${RUNNER_TEMP}/healthcheck.log"
          ts="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          body_file="${RUNNER_TEMP}/email-body.txt"

          if [ "${HEALTH_OUTCOME}" = "success" ]; then
            {
              echo "Tally app health check passed."
              echo
              echo "Time (UTC): ${ts}"
              echo "Workflow: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
              echo
              echo "Checks: lint, build, Supabase auth + PostgREST"
              if [ -n "${APP_URL:-}" ]; then
                echo "Live app: ${APP_URL}/primary"
              fi
              echo
              cat "${log}"
            } > "${body_file}"
            echo "subject=✅ Tally health check OK (${ts})" >> "$GITHUB_OUTPUT"
          else
            {
              echo "Tally app health check FAILED."
              echo
              echo "Time (UTC): ${ts}"
              echo "Workflow: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
              echo
              echo "--- Error log ---"
              cat "${log}"
            } > "${body_file}"
            echo "subject=❌ Tally health check FAILED (${ts})" >> "$GITHUB_OUTPUT"
          fi

          echo "body_file=${body_file}" >> "$GITHUB_OUTPUT"

      - name: Send notification email
        if: always() && env.NOTIFY_TO != ''
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: ${{ secrets.MAIL_SERVER }}
          server_port: ${{ secrets.MAIL_PORT }}
          username: ${{ secrets.MAIL_USERNAME }}
          password: ${{ secrets.MAIL_PASSWORD }}
          subject: ${{ steps.email.outputs.subject }}
          to: ${{ secrets.MAIL_TO }}
          from: ${{ secrets.MAIL_FROM || secrets.MAIL_USERNAME }}
          secure: true
          body: file://${{ steps.email.outputs.body_file }}

      - name: Mail secrets reminder
        if: always() && env.NOTIFY_TO == ''
        run: |
          echo "::warning::Add MAIL_SERVER, MAIL_PORT, MAIL_USERNAME, MAIL_PASSWORD, and MAIL_TO secrets to receive email notifications."

      - name: Fail if health checks failed
        if: steps.health.outcome != 'success'
        run: exit 1
