# Twice-weekly app test + Supabase keep-alive ping, with email notification.
# Schedule: Monday & Thursday 09:00 UTC.
#
# Required repository secrets (Settings → Secrets and variables → Actions):
#   SUPABASE_URL       — same as NEXT_PUBLIC_SUPABASE_URL in .env.local
#   SUPABASE_ANON_KEY  — same as NEXT_PUBLIC_SUPABASE_ANON_KEY in .env.local
#   MAIL_SERVER        — SMTP host (e.g. smtp.gmail.com)
#   MAIL_PORT          — 587 for Gmail STARTTLS; use 465 only with MAIL_SECURE=1
#   MAIL_USERNAME      — SMTP login / sender address
#   MAIL_PASSWORD      — SMTP password or Gmail app password (16 chars, no spaces)
#   MAIL_TO            — where to send result emails
#
# Optional:
#   MAIL_FROM          — From header (defaults to MAIL_USERNAME)
#   MAIL_SECURE        — set to 1 only when using port 465
#   APP_URL            — deployed app URL; also checks GET /primary

name: Weekly check

on:
  schedule:
    - cron: '0 9 * * 1,4'
  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
      APP_URL: ${{ secrets.APP_URL }}
      NOTIFY_TO: ${{ secrets.MAIL_TO }}
      MAIL_SECURE: ${{ secrets.MAIL_SECURE }}
      NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
      NEXT_PUBLIC_FIREBASE_API_KEY: placeholder
      NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN: placeholder.firebaseapp.com
      NEXT_PUBLIC_FIREBASE_PROJECT_ID: placeholder
      NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET: placeholder.appspot.com
      NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID: "000000000000"
      NEXT_PUBLIC_FIREBASE_APP_ID: "1:000000000000:web:placeholder"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run checks
        id: check
        continue-on-error: true
        run: |
          set -o pipefail
          bash scripts/ci-healthcheck.sh 2>&1 | tee "${RUNNER_TEMP}/check.log"
          exitCode="${PIPESTATUS[0]}"
          echo "exit_code=${exitCode}" >> "$GITHUB_OUTPUT"
          exit "${exitCode}"

      - name: Prepare email
        if: always()
        id: email
        env:
          CHECK_OUTCOME: ${{ steps.check.outcome }}
        run: |
          log="${RUNNER_TEMP}/check.log"
          ts="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          body_file="${RUNNER_TEMP}/email-body.txt"

          if [ "${CHECK_OUTCOME}" = "success" ]; then
            {
              echo "Tally weekly check passed."
              echo
              echo "Time (UTC): ${ts}"
              echo "Workflow: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
              echo
              echo "Checks: lint, build, Supabase keep-alive"
              if [ -n "${APP_URL:-}" ]; then
                echo "Live app: ${APP_URL}/primary"
              fi
              echo
              cat "${log}"
            } > "${body_file}"
            echo "subject=✅ Tally weekly check OK (${ts})" >> "$GITHUB_OUTPUT"
          else
            {
              echo "Tally weekly check FAILED."
              echo
              echo "Time (UTC): ${ts}"
              echo "Workflow: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
              echo
              echo "--- Error log ---"
              cat "${log}"
            } > "${body_file}"
            echo "subject=❌ Tally weekly check FAILED (${ts})" >> "$GITHUB_OUTPUT"
          fi

          echo "body_file=${body_file}" >> "$GITHUB_OUTPUT"

      - name: Send notification email
        if: always() && env.NOTIFY_TO != ''
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: ${{ secrets.MAIL_SERVER }}
          server_port: ${{ secrets.MAIL_PORT }}
          username: ${{ secrets.MAIL_USERNAME }}
          password: ${{ secrets.MAIL_PASSWORD }}
          subject: ${{ steps.email.outputs.subject }}
          to: ${{ secrets.MAIL_TO }}
          from: ${{ secrets.MAIL_FROM || secrets.MAIL_USERNAME }}
          secure: ${{ env.MAIL_SECURE == '1' || env.MAIL_SECURE == 'true' }}
          body: file://${{ steps.email.outputs.body_file }}

      - name: Mail secrets reminder
        if: always() && env.NOTIFY_TO == ''
        run: |
          echo "::warning::Add MAIL_SERVER, MAIL_PORT, MAIL_USERNAME, MAIL_PASSWORD, and MAIL_TO secrets to receive email notifications."

      - name: Fail if checks failed
        if: steps.check.outcome != 'success'
        run: exit 1
